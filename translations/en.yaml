configuration:
  update_interval:
    name: Update Interval
    description: >-
      How often to re-render and push the dashboard, in seconds. TRMNL caps
      uploads at 12 per hour, so keep this at 300 or higher (600 = 10 min).
  calendars:
    name: Calendars
    description: List of Home Assistant calendar entity IDs to display
  watched_entities:
    name: Watched Entities
    description: Entities to monitor on the dashboard
  show_weather:
    name: Show Weather
    description: Display weather information
  weather_entity:
    name: Weather Entity
    description: Home Assistant weather entity ID to use
  low_battery_enabled:
    name: Low Battery Alerts
    description: >-
      Surface devices whose battery is low. Auto-scans every battery entity in
      Home Assistant (numeric % sensors and low-battery binary sensors).
  low_battery_threshold:
    name: Low Battery Threshold
    description: Battery percentage below which a device is flagged as low (default 20).
  battery_exclude:
    name: Battery Exclusions
    description: >-
      Entity IDs or name fragments to ignore in low-battery alerts (e.g. phones,
      watches). Case-insensitive substring match.
  vehicle_name:
    name: Vehicle Name
    description: Label for the vehicle stat in the bottom strip (e.g. SKADI).
  vehicle_range_entity:
    name: Vehicle Range Entity
    description: >-
      Estimated range sensor. Leave blank to hide the vehicle stats entirely.
  vehicle_battery_entity:
    name: Vehicle Battery Entity
    description: Battery state-of-charge sensor (also excluded from low-battery alerts).
  vehicle_charging_entity:
    name: Vehicle Charging Entity
    description: Binary sensor that is "on" while the vehicle is charging.
  vehicle_plugged_entity:
    name: Vehicle Plugged-In Entity
    description: Binary sensor that is "on" while the charger is connected.
  eink_width:
    name: E-Ink Width
    description: Horizontal resolution of the e-ink device in pixels (TRMNL X = 1872)
  eink_height:
    name: E-Ink Height
    description: Vertical resolution of the e-ink device in pixels (TRMNL X = 1404)
  eink_webhook_url:
    name: TRMNL Webhook URL
    description: >-
      The private URL from your TRMNL "Webhook Image" plugin
      (Plugins → Webhook Image → Add). Frame Dash POSTs the rendered image here.
