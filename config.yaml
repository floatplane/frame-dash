name: "Frame Dash"
description: "Renders a calm family dashboard and pushes it to a TRMNL e-ink display via a Webhook Image plugin"
version: "0.5.1"
slug: "frame-dash"
url: "https://github.com/floatplane/frame-dash"
arch:
  - amd64
  - aarch64
startup: "application"
boot: "auto"
homeassistant_api: true
hassio_api: true
map:
  - type: share
    read_only: false
options:
  update_interval: 600
  calendars:
    - "calendar.family"
  watched_entities:
    doors: []
    lights: []
    climate: []
    alerts: []
  show_weather: true
  weather_entity: "weather.home"
  eink_width: 1872
  eink_height: 1404
  eink_webhook_url: ""
schema:
  update_interval: int
  calendars:
    - str
  watched_entities:
    doors:
      - str
    lights:
      - str
    climate:
      - str
    alerts:
      - str
  show_weather: bool
  weather_entity: str
  eink_width: int
  eink_height: int
  eink_webhook_url: password?
