name: "Frame Dash"
description: "Renders a calm family dashboard and serves it to a TRMNL X e-ink display"
version: "0.3.1"
slug: "frame-dash"
url: "https://github.com/floatplane/frame-dash"
arch:
  - amd64
  - aarch64
startup: "application"
boot: "auto"
homeassistant_api: true
hassio_api: true
map:
  - type: share
    read_only: false
ports:
  2300/tcp: 2300
ports_description:
  2300/tcp: "BYOS server for the TRMNL X e-ink display. Point the device here."
options:
  update_interval: 300
  calendars:
    - "calendar.family"
  watched_entities:
    doors: []
    lights: []
    climate: []
    alerts: []
  show_weather: true
  weather_entity: "weather.home"
  eink_width: 1872
  eink_height: 1404
  eink_port: 2300
schema:
  update_interval: int
  calendars:
    - str
  watched_entities:
    doors:
      - str
    lights:
      - str
    climate:
      - str
    alerts:
      - str
  show_weather: bool
  weather_entity: str
  eink_width: int
  eink_height: int
  eink_port: int
