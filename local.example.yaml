# Frame Dash - Standalone Configuration
# Copy this to local.yaml and edit for your setup.

# Home Assistant connection (not needed when running as HA add-on)
ha_url: "http://homeassistant.local:8123"
ha_token: "YOUR_LONG_LIVED_ACCESS_TOKEN_HERE"

# How often to re-render the dashboard, in seconds
update_interval: 300

# Calendar entity IDs
calendars:
  - calendar.family
  - calendar.work

# Entities to watch
# Doors/locks: shown when unlocked/open
# Lights: shown when left on
# Climate: always shown
# Alerts: shown based on state
watched_entities:
  doors:
    - lock.front_door
    - lock.back_door
    - binary_sensor.garage_door
  lights:
    - light.living_room
    - light.kitchen
  climate:
    - climate.main_floor
    - sensor.outdoor_temperature
  alerts:
    - binary_sensor.washer
    - binary_sensor.dryer

# Weather
show_weather: true
weather_entity: "weather.home"

# E-ink display (TRMNL X)
eink_width: 1872
eink_height: 1404
eink_port: 2300
eink_refresh_rate: 300  # how often the device polls, in seconds
