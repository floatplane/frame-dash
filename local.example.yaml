# Frame Dash - Standalone Configuration
# Copy this to local.yaml and edit for your setup.

# Home Assistant connection (not needed when running as HA add-on)
ha_url: "http://homeassistant.local:8123"
ha_token: "YOUR_LONG_LIVED_ACCESS_TOKEN_HERE"

# How often to re-render and push the dashboard, in seconds.
# TRMNL caps uploads at 12/hour, so keep this >= 300 (600 = 10 min).
update_interval: 600

# Calendar entity IDs
calendars:
  - calendar.family
  - calendar.work

# Entities to watch
# Doors/locks: shown when unlocked/open
# Lights: shown when left on
# Climate: always shown
# Alerts: shown based on state
watched_entities:
  doors:
    - lock.front_door
    - lock.back_door
    - binary_sensor.garage_door
  lights:
    - light.living_room
    - light.kitchen
  climate:
    - climate.main_floor
    - sensor.outdoor_temperature
  alerts:
    - binary_sensor.washer
    - binary_sensor.dryer

# Weather
show_weather: true
weather_entity: "weather.home"

# Low-battery alerts (auto-scans all battery entities)
low_battery_enabled: true
low_battery_threshold: 20
battery_exclude: []  # e.g. ["iphone", "watch"] to ignore phones/watches

# Vehicle stats in the bottom strip (leave vehicle_range_entity blank to hide)
vehicle_name: "SKADI"
vehicle_range_entity: "sensor.skadi_estimated_vehicle_range"
vehicle_battery_entity: "sensor.skadi_battery_state_of_charge"
vehicle_charging_entity: "binary_sensor.skadi_charging_status"
vehicle_plugged_entity: "binary_sensor.skadi_charger_connection"

# Energy independence in the bottom strip (leave energy_home_use_entity blank to hide)
energy_home_use_entity: "sensor.franklinwh_home_use"
energy_grid_import_entity: "sensor.franklinwh_grid_import"
energy_solar_power_entity: "sensor.franklinwh_solar_production"
energy_battery_discharge_entity: "sensor.franklin_battery_discharging"
energy_home_load_entity: "sensor.franklinwh_home_load"

# E-ink display (TRMNL X)
eink_width: 1872
eink_height: 1404
# Private URL from your TRMNL "Webhook Image" plugin (Plugins → Webhook Image → Add)
eink_webhook_url: "https://usetrmnl.com/api/custom_plugins/YOUR_UUID"
