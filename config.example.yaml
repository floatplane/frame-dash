# Frame Dash - Standalone Configuration
# Copy this to config.yaml and edit for your setup.

# Home Assistant connection (not needed when running as HA add-on)
ha_url: "http://homeassistant.local:8123"
ha_token: "YOUR_LONG_LIVED_ACCESS_TOKEN_HERE"

# Samsung Frame TV
samsung_tv_ip: "192.168.1.100"

# Update interval in seconds
update_interval: 300

# TV resolution (3840x2160 for 4K, 1920x1080 for 1080p)
tv_width: 3840
tv_height: 2160

# Calendar entity IDs
calendars:
  - calendar.family
  - calendar.work

# Entities to watch
# Doors/locks: shown when unlocked/open
# Lights: shown when left on
# Climate: always shown
# Alerts: shown based on state
watched_entities:
  doors:
    - lock.front_door
    - lock.back_door
    - binary_sensor.garage_door
  lights:
    - light.living_room
    - light.kitchen
  climate:
    - climate.main_floor
    - sensor.outdoor_temperature
  alerts:
    - binary_sensor.washer
    - binary_sensor.dryer

# Display
theme: "light"  # "light" or "dark"
show_clock: true
show_weather: true
weather_entity: "weather.home"
